name: Compilar APK Saldaterra

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            buildozer-

      - name: Dependências do sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential git zip unzip \
            libffi-dev libssl-dev \
            zlib1g-dev libncurses5-dev \
            cmake autoconf libtool \
            pkg-config \
            libsqlite3-dev \
            python3-pip \
            ccache \
            lld

      - name: Instalar Buildozer e Cython
        run: |
          pip install --upgrade pip setuptools wheel
          pip install buildozer==1.5.0
          pip install cython==3.0.10

      - name: Compilar APK Debug
        run: |
          set -o pipefail
          buildozer -v android debug 2>&1 | tee build.log

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Saldaterra-Impressora-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload log de erro
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-erro
          path: build.log
          retention-days: 7
